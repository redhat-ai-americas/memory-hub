---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: auth-server
spec:
  runPolicy: Serial
  output:
    to:
      kind: ImageStreamTag
      name: auth-server:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
      noCache: true
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: auth-server
---
# Secrets are managed out-of-band by deploy.sh, NOT defined in this manifest.
# This is intentional: the manifest must be safe to `oc apply -f openshift.yaml`
# repeatedly without clobbering generated values.
#
# - auth-rsa-keys (RSA-2048 keypair for JWT signing): generated and applied
#   by deploy.sh on first run; reused on subsequent runs. To regenerate
#   manually:
#     openssl genrsa 2048 > /tmp/private.pem
#     openssl rsa -in /tmp/private.pem -pubout > /tmp/public.pem
#     oc create secret generic auth-rsa-keys \
#         --from-file=AUTH_RSA_PRIVATE_KEY_PEM=/tmp/private.pem \
#         --from-file=AUTH_RSA_PUBLIC_KEY_PEM=/tmp/public.pem \
#         -n memoryhub-auth
#
# - auth-admin-key (admin API key): create separately:
#     openssl rand -base64 32 | tr -d '\n' > /tmp/ak.txt
#     oc create secret generic auth-admin-key \
#         --from-literal=AUTH_ADMIN_KEY="$(cat /tmp/ak.txt)" \
#         -n memoryhub-auth
---
# Combined CA bundle — OpenShift injects the service-signing CA into this
# ConfigMap.  The init container concatenates it with the cluster CA to
# produce a bundle that covers both kubernetes.default.svc (cluster CA)
# and oauth-openshift.openshift-authentication.svc (service CA).
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-ca-bundle
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
      annotations:
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      initContainers:
      - name: combine-ca
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ['sh', '-c']
        args:
        - |
          cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              /etc/pki/service-ca/service-ca.crt \
              > /etc/pki/combined-ca/ca-bundle.crt
        volumeMounts:
        - name: service-ca
          mountPath: /etc/pki/service-ca
          readOnly: true
        - name: combined-ca
          mountPath: /etc/pki/combined-ca
      containers:
      - name: auth-server
        image: auth-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: combined-ca
          mountPath: /etc/pki/combined-ca
          readOnly: true
        envFrom:
        - secretRef:
            name: memoryhub-pg-credentials
        - secretRef:
            name: auth-rsa-keys
        - secretRef:
            name: auth-admin-key
        env:
        - name: AUTH_HOST
          value: "0.0.0.0"
        - name: AUTH_PORT
          value: "8081"
        - name: AUTH_DB_HOST
          value: "memoryhub-pg.memoryhub-db.svc.cluster.local"
        - name: AUTH_DB_PORT
          value: "5432"
        - name: AUTH_DB_NAME
          value: "memoryhub"
        - name: AUTH_DB_USER
          value: "memoryhub"
        - name: AUTH_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: memoryhub-pg-credentials
              key: POSTGRES_PASSWORD
        # Cluster-specific values — deploy.sh replaces these placeholders
        # via sed at apply time.  The placeholders must not be valid URLs
        # so a missed substitution fails loudly on startup.
        - name: AUTH_ISSUER
          value: "__AUTH_ISSUER__"
        - name: AUTH_OPENSHIFT_OAUTH_AUTHORIZE_URL
          value: "__OAUTH_AUTHORIZE_URL__"
        # Server-side calls use internal service URLs (cluster-generic)
        - name: AUTH_OPENSHIFT_OAUTH_TOKEN_URL
          value: "https://oauth-openshift.openshift-authentication.svc/oauth/token"
        - name: AUTH_OPENSHIFT_USER_INFO_URL
          value: "https://kubernetes.default.svc/apis/user.openshift.io/v1/users/~"
        - name: AUTH_OPENSHIFT_TLS_VERIFY
          value: "true"
        - name: AUTH_OPENSHIFT_CA_BUNDLE
          value: "/etc/pki/combined-ca/ca-bundle.crt"
        # Group-based access control — leave empty to allow all
        # authenticated OpenShift users, or set to a group name to restrict.
        - name: AUTH_OPENSHIFT_ALLOWED_GROUP
          value: "memoryhub-users"
        - name: AUTH_OPENSHIFT_OAUTH_CLIENT_ID
          value: "memoryhub-auth-broker"
        - name: AUTH_OPENSHIFT_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: openshift-oauth-client-secret
              key: AUTH_OPENSHIFT_OAUTH_CLIENT_SECRET
        resources:
          limits:
            memory: "256Mi"
            cpu: "250m"
          requests:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: service-ca
        configMap:
          name: service-ca-bundle
      - name: combined-ca
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
spec:
  selector:
    app: auth-server
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: auth-server
spec:
  to:
    kind: Service
    name: auth-server
  port:
    targetPort: 8081
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
