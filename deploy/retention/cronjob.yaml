---
# Daily CronJob to enforce thread retention policies.
# Runs at 02:00 UTC daily.
#
# Phase 1: Soft-delete threads where expires_at <= now() and status='active'
# Phase 2: Hard-delete threads past min_retention_days (respects legal_hold)
#
# Deploy: oc apply -f deploy/retention/cronjob.yaml -n memoryhub
apiVersion: batch/v1
kind: CronJob
metadata:
  name: memoryhub-retention-sweep
  labels:
    app.kubernetes.io/name: memoryhub-retention-sweep
    app.kubernetes.io/component: maintenance
    app.kubernetes.io/part-of: memoryhub
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: retention-sweep
              image: image-registry.openshift-image-registry.svc:5000/memoryhub/memoryhub-core:latest
              command:
                - python
                - -m
                - memoryhub_core.cli.retention_sweep
              env:
                - name: MEMORYHUB_DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-db-credentials
                      key: host
                - name: MEMORYHUB_DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-db-credentials
                      key: port
                - name: MEMORYHUB_DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-db-credentials
                      key: database
                - name: MEMORYHUB_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-db-credentials
                      key: username
                - name: MEMORYHUB_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-db-credentials
                      key: password
                - name: MEMORYHUB_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-s3-credentials
                      key: endpoint
                - name: MEMORYHUB_S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-s3-credentials
                      key: access-key
                - name: MEMORYHUB_S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: memoryhub-s3-credentials
                      key: secret-key
                - name: MEMORYHUB_S3_BUCKET
                  value: memoryhub
                - name: MEMORYHUB_S3_SECURE
                  value: "false"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
