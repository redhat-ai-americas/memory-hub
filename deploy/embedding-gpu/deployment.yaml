apiVersion: apps/v1
kind: Deployment
metadata:
  name: granite-embedding
  namespace: embedding-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: granite-embedding
  template:
    metadata:
      labels:
        app: granite-embedding
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:1.9
          args:
            - --model-id
            - ibm-granite/granite-embedding-small-english-r2
            - --port
            - "8080"
          env:
            - name: HF_HUB_CACHE
              value: /data/models
            - name: TRANSFORMERS_CACHE
              value: /data/models
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: cache
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: embedding-model-cache
