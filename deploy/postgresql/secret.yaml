# REFERENCE ONLY — not applied by kustomize or deploy-full.sh.
#
# deploy-full.sh creates this Secret idempotently with a generated
# password on first install.  This file documents the expected schema
# for manual debugging or disaster recovery.
#
# For production, use OpenShift Secrets management or HashiCorp Vault.
apiVersion: v1
kind: Secret
metadata:
  name: memoryhub-pg-credentials
  labels:
    app.kubernetes.io/name: memoryhub-pg
    app.kubernetes.io/part-of: memoryhub
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: memoryhub
  POSTGRES_PASSWORD: REPLACE-ME-GENERATE-STRONG-PASSWORD
  POSTGRES_DB: memoryhub
