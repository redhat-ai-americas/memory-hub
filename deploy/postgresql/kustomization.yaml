apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: memoryhub-db
resources:
  - namespace.yaml
  # secret.yaml is excluded — deploy-full.sh creates the Secret
  # idempotently with a generated password on first install and
  # preserves it on subsequent runs.  See secret.yaml for the
  # expected schema (reference only).
  - pvc.yaml
  - configmap-init.yaml
  - statefulset.yaml
  - service.yaml
