---
# Minimal-profile MCP server instance for small model (7B) testing.
# Runs alongside the primary memory-hub-mcp deployment in the same namespace.
# Shares DB credentials, Valkey, MinIO, and user config from the primary.
# Only registers 4 tools: register_session, search_memory, write_memory, read_memory.
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: memory-hub-mcp-minimal
spec:
  runPolicy: Serial
  output:
    to:
      kind: ImageStreamTag
      name: memory-hub-mcp-minimal:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
      noCache: true
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: memory-hub-mcp-minimal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hub-mcp-minimal
  labels:
    app.kubernetes.io/name: memory-hub-mcp-minimal
    app.kubernetes.io/part-of: memory-hub-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-hub-mcp-minimal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-hub-mcp-minimal
      annotations:
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      containers:
      - name: mcp-server
        image: memory-hub-mcp-minimal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: memoryhub-db-credentials
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: MCP_HTTP_HOST
          value: "0.0.0.0"
        - name: MCP_HTTP_PORT
          value: "8080"
        - name: MCP_HTTP_PATH
          value: "/mcp/"
        - name: MCP_LOG_LEVEL
          value: "INFO"
        - name: MEMORYHUB_TOOL_PROFILE
          value: "minimal"
        - name: MEMORYHUB_USERS_FILE
          value: /config/users.json
        - name: AUTH_JWKS_URI
          value: "https://auth-server-memoryhub-auth.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/.well-known/jwks.json"
        - name: AUTH_ISSUER
          value: "https://auth-server-memoryhub-auth.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com"
        - name: AUTH_AUDIENCE
          value: "memoryhub"
        - name: MEMORYHUB_VALKEY_URL
          value: "redis://memoryhub-valkey.memory-hub-mcp.svc.cluster.local:6379/0"
        - name: MEMORYHUB_S3_ENDPOINT
          value: "memoryhub-minio:9000"
        - name: MEMORYHUB_S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: memoryhub-minio-credentials
              key: MINIO_ROOT_USER
        - name: MEMORYHUB_S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: memoryhub-minio-credentials
              key: MINIO_ROOT_PASSWORD
        - name: MEMORYHUB_S3_BUCKET
          value: "memoryhub"
        - name: MEMORYHUB_S3_SECURE
          value: "false"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: users-config
          mountPath: /config
          readOnly: true
      volumes:
      - name: users-config
        configMap:
          name: memoryhub-users
---
apiVersion: v1
kind: Service
metadata:
  name: memory-hub-mcp-minimal
spec:
  selector:
    app.kubernetes.io/name: memory-hub-mcp-minimal
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: memory-hub-mcp-minimal
spec:
  path: /mcp/
  to:
    kind: Service
    name: memory-hub-mcp-minimal
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
