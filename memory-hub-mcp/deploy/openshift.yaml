---
apiVersion: v1
kind: Namespace
metadata:
  name: memory-hub-mcp
  labels:
    app.kubernetes.io/part-of: memoryhub
---
apiVersion: v1
kind: Secret
metadata:
  name: memoryhub-db-credentials
  namespace: memory-hub-mcp
type: Opaque
stringData:
  MEMORYHUB_DB_HOST: memoryhub-pg.memoryhub-db.svc.cluster.local
  MEMORYHUB_DB_PORT: "5432"
  MEMORYHUB_DB_NAME: memoryhub
  MEMORYHUB_DB_USER: memoryhub
  MEMORYHUB_DB_PASSWORD: memoryhub-dev-password
  MEMORYHUB_EMBEDDING_URL: https://all-minilm-l6-v2-embedding-model.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/embed
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: memory-hub-mcp
  namespace: memory-hub-mcp
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: memory-hub-mcp
  namespace: memory-hub-mcp
spec:
  output:
    to:
      kind: ImageStreamTag
      name: memory-hub-mcp:latest
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  triggers: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hub-mcp
  namespace: memory-hub-mcp
  labels:
    app.kubernetes.io/name: memory-hub-mcp
    app.kubernetes.io/part-of: memoryhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-hub-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-hub-mcp
      annotations:
        # Force rollout when the ImageStream gets a new image
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      containers:
        - name: mcp-server
          image: image-registry.openshift-image-registry.svc:5000/memory-hub-mcp/memory-hub-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: memoryhub-db-credentials
          env:
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_HTTP_HOST
              value: "0.0.0.0"
            - name: MCP_HTTP_PORT
              value: "8080"
            - name: MCP_HTTP_PATH
              value: /mcp/
            - name: MCP_LOG_LEVEL
              value: INFO
            - name: MEMORYHUB_USERS_FILE
              value: /config/users.json
          volumeMounts:
            - name: users-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: users-config
          configMap:
            name: memoryhub-users
---
apiVersion: v1
kind: Service
metadata:
  name: memory-hub-mcp
  namespace: memory-hub-mcp
  labels:
    app.kubernetes.io/name: memory-hub-mcp
    app.kubernetes.io/part-of: memoryhub
spec:
  selector:
    app.kubernetes.io/name: memory-hub-mcp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: memory-hub-mcp
  namespace: memory-hub-mcp
  labels:
    app.kubernetes.io/name: memory-hub-mcp
    app.kubernetes.io/part-of: memoryhub
spec:
  to:
    kind: Service
    name: memory-hub-mcp
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
