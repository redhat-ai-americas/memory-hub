---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: memory-hub-mcp
spec:
  runPolicy: Serial
  output:
    to:
      kind: ImageStreamTag
      name: memory-hub-mcp:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
      noCache: true
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: memory-hub-mcp
---
# WARNING: Dev credentials only. For production, use OpenShift Secrets management
# or HashiCorp Vault. The embedding URL is cluster-specific and must be updated
# per deployment.
apiVersion: v1
kind: Secret
metadata:
  name: memoryhub-db-credentials
type: Opaque
stringData:
  MEMORYHUB_DB_HOST: memoryhub-pg.memoryhub-db.svc.cluster.local
  MEMORYHUB_DB_PORT: "5432"
  MEMORYHUB_DB_NAME: memoryhub
  MEMORYHUB_DB_USER: memoryhub
  MEMORYHUB_DB_PASSWORD: memoryhub-dev-password
  MEMORYHUB_EMBEDDING_URL: https://all-minilm-l6-v2-embedding-model.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/embed
  # Cross-encoder reranker for two-vector retrieval (#58). When unset
  # or unreachable, search_memories_with_focus falls back to a cosine-
  # rank blend with focus -- correct results without the cross-encoder
  # lift. Cluster-specific URL; update per deployment.
  MEMORYHUB_RERANKER_URL: https://ms-marco-minilm-l12-v2-reranker-model.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hub-mcp
  labels:
    app.kubernetes.io/name: memory-hub-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-hub-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-hub-mcp
      annotations:
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      containers:
      - name: mcp-server
        image: memory-hub-mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: memoryhub-db-credentials
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: MCP_HTTP_HOST
          value: "0.0.0.0"
        - name: MCP_HTTP_PORT
          value: "8080"
        - name: MCP_HTTP_PATH
          value: "/mcp/"
        - name: MCP_LOG_LEVEL
          value: "INFO"
        - name: MEMORYHUB_USERS_FILE
          value: /config/users.json
        # JWT verification — issued by the memoryhub-auth service.
        # If these vars are unset, the server runs in session-only auth mode
        # (legacy register_session API key path). Production deployments must
        # set all three so JWTs from the auth service are verified.
        - name: AUTH_JWKS_URI
          value: "https://auth-server-memoryhub-auth.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/.well-known/jwks.json"
        - name: AUTH_ISSUER
          value: "https://auth-server-memoryhub-auth.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com"
        - name: AUTH_AUDIENCE
          value: "memoryhub"
        # Valkey backs session focus history (#61) and, when it lands, the
        # #62 Pattern E push-side broadcast filter. The Valkey pod runs in
        # the same namespace (memory-hub-mcp) per deploy/valkey/.
        - name: MEMORYHUB_VALKEY_URL
          value: "redis://memoryhub-valkey.memory-hub-mcp.svc.cluster.local:6379/0"
        # MinIO for two-tier storage (#84). Content exceeding the S3
        # threshold is uploaded to MinIO with semantic chunks for search.
        # When unset, oversized content stays inline with chunks only.
        - name: MEMORYHUB_S3_ENDPOINT
          value: "memoryhub-minio:9000"
        - name: MEMORYHUB_S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: memoryhub-minio-credentials
              key: MINIO_ROOT_USER
        - name: MEMORYHUB_S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: memoryhub-minio-credentials
              key: MINIO_ROOT_PASSWORD
        - name: MEMORYHUB_S3_BUCKET
          value: "memoryhub"
        - name: MEMORYHUB_S3_SECURE
          value: "false"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: users-config
          mountPath: /config
          readOnly: true
      volumes:
      - name: users-config
        configMap:
          name: memoryhub-users
---
apiVersion: v1
kind: Service
metadata:
  name: memory-hub-mcp
spec:
  selector:
    app.kubernetes.io/name: memory-hub-mcp
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: memory-hub-mcp
spec:
  path: /mcp/
  to:
    kind: Service
    name: memory-hub-mcp
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect