---
# API KEY AUTH — ConfigMap-based user/agent registration for the MCP server.
#
# This is the simpler of two auth paths. Each entry maps an api_key (bearer
# token) to a user_id with memory-level scopes (user, project, organizational,
# etc.). Used by: Claude Code, the memoryhub CLI, the Python SDK, and scripts.
#
# The other auth path (OAuth 2.1) uses scripts/seed-clients.json for
# client_credentials grants with token-based scopes (memory:read, etc.).
# Most users only need this ConfigMap; OAuth is for production token flows.
#
# On first install, deploy.sh auto-generates this file with random keys if
# it doesn't exist. To bring your own keys:
#     cp users-configmap.example.yaml users-configmap.yaml
#     # replace REPLACE-ME placeholders (e.g. openssl rand -hex 16)
#     ./deploy.sh
#
# The api_key format is: mh-dev-<hex> (e.g. mh-dev-a76811f5d871abcd1234).
apiVersion: v1
kind: ConfigMap
metadata:
  name: memoryhub-users
  namespace: memory-hub-mcp
  labels:
    app.kubernetes.io/name: memory-hub-mcp
    app.kubernetes.io/part-of: memoryhub
data:
  users.json: |
