---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mcp-server
spec:
  output:
    to:
      kind: ImageStreamTag
      name: mcp-server:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: mcp-server
---
# WARNING: Dev credentials only. For production, use OpenShift Secrets management
# or HashiCorp Vault. The embedding URL is cluster-specific and must be updated
# per deployment.
apiVersion: v1
kind: Secret
metadata:
  name: memoryhub-db-credentials
type: Opaque
stringData:
  MEMORYHUB_DB_HOST: memoryhub-pg.memoryhub-db.svc.cluster.local
  MEMORYHUB_DB_PORT: "5432"
  MEMORYHUB_DB_NAME: memoryhub
  MEMORYHUB_DB_USER: memoryhub
  MEMORYHUB_DB_PASSWORD: memoryhub-dev-password
  MEMORYHUB_EMBEDDING_URL: https://all-minilm-l6-v2-embedding-model.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/embed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
      annotations:
        alpha.image.policy.openshift.io/resolve-names: '*'
    spec:
      containers:
      - name: mcp-server
        image: mcp-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: memoryhub-db-credentials
        env:
        - name: MCP_TRANSPORT
          value: "http"
        - name: MCP_HTTP_HOST
          value: "0.0.0.0"
        - name: MCP_HTTP_PORT
          value: "8080"
        - name: MCP_HTTP_PATH
          value: "/mcp/"
        - name: MCP_LOG_LEVEL
          value: "INFO"
        - name: MEMORYHUB_USERS_FILE
          value: /config/users.json
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: users-config
          mountPath: /config
          readOnly: true
      volumes:
      - name: users-config
        configMap:
          name: memoryhub-users
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-server
spec:
  path: /mcp/
  to:
    kind: Service
    name: mcp-server
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect