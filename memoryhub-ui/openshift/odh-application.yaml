  namespace: redhat-ods-applications
  labels:
    app.opendatahub.io/rhods-dashboard: "true"
  annotations:
    opendatahub.io/categories: "Model development"
spec:
  displayName: MemoryHub
  description: >-
    Centralized agent memory with governance and curation
    for OpenShift AI workloads.
  category: Red Hat managed
  provider: "Red Hat"
  support: "red hat"
  route: memoryhub-ui
  routeNamespace: memory-hub-mcp
  docsLink: ""
  getStartedLink: ""
  getStartedMarkDown: |
    # MemoryHub

    Centralized, governed memory for AI agents running on OpenShift AI.

    ## Getting Started

    1. Click **Open application** to access the MemoryHub dashboard.
    2. Browse agent memories in the interactive Memory Graph.
    3. Review status metrics, scope distribution, and recent activity.
    4. Use the MCP server endpoint to connect your agents.

    ## Architecture

    - **MCP Server** — Agents read/write memories via the MCP protocol (OAuth 2.1 JWT auth)
    - **Dashboard** — Platform admins visualize and monitor the memory landscape
    - **PostgreSQL + pgvector** — Relational storage with vector similarity search
    - **OAuth 2.1 Auth Service** — Issues short-lived JWTs for agent authentication

    ## Prerequisites

    - The MemoryHub MCP server must be deployed in the `memory-hub-mcp` namespace.
    - Agents connect via the MCP server Route using OAuth 2.1 JWT tokens.
    - The PostgreSQL database must be running in the `memoryhub-db` namespace.
