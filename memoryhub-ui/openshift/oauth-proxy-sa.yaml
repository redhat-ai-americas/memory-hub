---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: memoryhub-ui
  namespace: memory-hub-mcp
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"memoryhub-ui"}}'
# The memoryhub-ui-proxy Secret (session-secret) must be created separately:
#   python3 -c "import secrets; print(secrets.token_urlsafe(24), end='')" | head -c 32 > /tmp/ss.txt
#   oc create secret generic memoryhub-ui-proxy --from-file=session-secret=/tmp/ss.txt -n memory-hub-mcp
