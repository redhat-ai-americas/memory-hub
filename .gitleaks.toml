[[rules]]
id = "memoryhub-hex-api-key"
description = "MemoryHub API key (hex format: mh-(dev|prod)-<16 hex chars>)"
regex = '''mh-(dev|prod)-[a-f0-9]{16}'''

  [rules.allowlist]
  paths = [
    '''dev-users\.json$''',
    '''tests\/.*\.py$''',
    '''\.claude\/worktrees\/''',
    '''users-configmap\.example\.yaml$''',
  ]

[allowlist]
  description = "MemoryHub project allowlist for false positives"

  paths = [
    '''docs\/.*\.md$''',
    '''retrospectives\/.*\.md$''',
    '''\.claude\/commands\/.*\.md$''',
    '''\.claude\/rules\/.*\.md$''',
  ]

  regexes = [
    '''mh-dev-.*-\d{4}''',
    '''mh-svc-.*-\d{4}''',
  ]
