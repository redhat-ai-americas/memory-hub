name: Tests

on:
  push:
    branches: [ main ]
    tags:
      - 'sdk/v*.*.*'
      - 'mcp/v*.*.*'
      - 'memoryhub-cli/v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  sdk-tests:
    name: SDK Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Check for SDK changes
        if: github.event_name == 'pull_request'
        id: sdk-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            sdk:
              - 'sdk/**'

      - name: Set up Python ${{ matrix.python-version }}
        if: github.event_name != 'pull_request' || steps.sdk-changes.outputs.sdk == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.sdk-changes.outputs.sdk == 'true'
        run: |
          python -m pip install --upgrade pip
          cd sdk && pip install -e .[dev]

      - name: Lint with ruff
        if: github.event_name != 'pull_request' || steps.sdk-changes.outputs.sdk == 'true'
        run: cd sdk && ruff check src

      - name: Run tests with pytest
        if: github.event_name != 'pull_request' || steps.sdk-changes.outputs.sdk == 'true'
        run: cd sdk && pytest

  mcp-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for MCP changes
        if: github.event_name == 'pull_request'
        id: mcp-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            mcp:
              - 'memory-hub-mcp/**'

      - name: Set up Python 3.11
        if: github.event_name != 'pull_request' || steps.mcp-changes.outputs.mcp == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.mcp-changes.outputs.mcp == 'true'
        run: |
          python -m pip install --upgrade pip
          cd memory-hub-mcp && pip install -r requirements.txt && pip install pytest

      - name: Run tests with pytest
        if: github.event_name != 'pull_request' || steps.mcp-changes.outputs.mcp == 'true'
        run: cd memory-hub-mcp && pytest tests/ -v --ignore=tests/test_mcp_tools.py -k "not integration"
        continue-on-error: true  # MCP tests need PostgreSQL; full suite runs on OpenShift

  auth-tests:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for auth changes
        if: github.event_name == 'pull_request'
        id: auth-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'memoryhub-auth/**'

      - name: Set up Python 3.11
        if: github.event_name != 'pull_request' || steps.auth-changes.outputs.auth == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.auth-changes.outputs.auth == 'true'
        run: |
          python -m pip install --upgrade pip
          cd memoryhub-auth && pip install -e '.[dev]'

      - name: Run tests with pytest
        if: github.event_name != 'pull_request' || steps.auth-changes.outputs.auth == 'true'
        run: cd memoryhub-auth && pytest tests/ -v

  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for CLI changes
        if: github.event_name == 'pull_request'
        id: cli-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - 'memoryhub-cli/**'

      - name: Set up Python 3.11
        if: github.event_name != 'pull_request' || steps.cli-changes.outputs.cli == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.cli-changes.outputs.cli == 'true'
        run: |
          python -m pip install --upgrade pip
          cd memoryhub-cli && pip install -e .[dev]

      - name: Lint with ruff
        if: github.event_name != 'pull_request' || steps.cli-changes.outputs.cli == 'true'
        run: cd memoryhub-cli && ruff check src

      - name: Run tests with pytest
        if: github.event_name != 'pull_request' || steps.cli-changes.outputs.cli == 'true'
        run: cd memoryhub-cli && pytest

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_USER: memoryhub
          POSTGRES_PASSWORD: memoryhub-test
          POSTGRES_DB: memoryhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memoryhub -d memoryhub"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for integration test changes
        if: github.event_name == 'pull_request'
        id: integration-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            integration:
              - 'src/**'
              - 'tests/integration/**'
              - 'alembic/**'

      - name: Set up Python 3.11
        if: github.event_name != 'pull_request' || steps.integration-changes.outputs.integration == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.integration-changes.outputs.integration == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run integration tests
        if: github.event_name != 'pull_request' || steps.integration-changes.outputs.integration == 'true'
        env:
          MEMORYHUB_DB_HOST: localhost
          MEMORYHUB_DB_PORT: "5432"
          MEMORYHUB_DB_USER: memoryhub
          MEMORYHUB_DB_PASSWORD: memoryhub-test
          MEMORYHUB_DB_NAME: memoryhub
        run: pytest tests/integration/ -v --tb=short

  status:
    name: Tests Status
    runs-on: ubuntu-latest
    needs: [sdk-tests, mcp-tests, auth-tests, cli-tests, integration-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.sdk-tests.result }}" == "failure" ] || [ "${{ needs.mcp-tests.result }}" == "failure" ] || [ "${{ needs.auth-tests.result }}" == "failure" ] || [ "${{ needs.cli-tests.result }}" == "failure" ] || [ "${{ needs.integration-tests.result }}" == "failure" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed successfully"
