name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Test
        run: |
          EXIT_CODE=0
          pytest tests/ -v --tb=short || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 5 ]; then
            echo "No tests collected yet — passing CI"
            exit 0
          fi
          exit $EXIT_CODE
