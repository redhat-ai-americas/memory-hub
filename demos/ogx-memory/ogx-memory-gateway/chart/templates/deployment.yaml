apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway-template.fullname" . }}
  labels:
    {{- include "gateway-template.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gateway-template.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods on ConfigMap changes so `helm upgrade --reuse-values --set config.X=Y` takes effect.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "gateway-template.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gateway-template.fullname" . }}
          {{- if and (eq .Values.auth.mode "jwt") .Values.auth.jwt.exchange.enabled }}
          env:
            - name: GATEWAY_AUTH_JWT_TOKEN_EXCHANGE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "auth.jwt.exchange.clientSecretRef.name is required when auth.jwt.exchange.enabled=true" .Values.auth.jwt.exchange.clientSecretRef.name }}
                  key: {{ .Values.auth.jwt.exchange.clientSecretRef.key | default "client-secret" }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
